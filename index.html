<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Поставь парную аватарку со мной!">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Давай дружить аватарками!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blocked-overlay hidden" id="blockedScreen">
        <div class="blocked-card">
            <span class="blocked-emoji">😢</span>
            <h2 class="blocked-title">Ты уже отказалась</h2>
            <p class="blocked-text">Ты пропустила шанс поставить парную аватарку со мной...</p>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modal">
        <div class="modal">
            <h2 class="modal-title">Давай поставим парные аватарки?</h2>
            <div class="modal-buttons">
                <button class="modal-btn yes" onclick="acceptInvite()">Да, давай! 🎉</button>
                <button class="modal-btn no" onclick="declineInvite()">Нет</button>
            </div>
        </div>
    </div>

    <div class="container hidden" id="mainContent">
        <div class="card">
            <div class="wave">🥳</div>
            <h1 class="title">Ура! Погнали!</h1>
            <p class="subtitle">Выбери свою аватарку и скачай</p>
            
            <div class="avatars-wrapper">
                <div class="avatar-container">
                    <div class="avatar left">
                        <img src="1.jpg" alt="Твоя аватарка" loading="lazy">
                        <div class="glow"></div>
                    </div>
                    <span class="label">Это я</span>
                </div>
                
                <div class="friendship-badge">
                    <svg viewBox="0 0 100 100" class="handshake-icon">
                        <text x="50" y="65" text-anchor="middle" font-size="60">🤝</text>
                    </svg>
                </div>
                
                <div class="avatar-container">
                    <div class="avatar right">
                        <img src="2.jpg" alt="Моя аватарка" loading="lazy">
                        <div class="glow"></div>
                    </div>
                    <span class="label">Это ты!</span>
                </div>
            </div>
            
            <button class="cta-button" onclick="handleDownload()">
                <span class="button-text">Скачать свою аватарку</span>
                <span class="button-icon">🎁</span>
            </button>
            
            <div class="instructions">
                <div class="step">
                    <span class="step-number">1</span>
                    <span class="step-text">Нажми на кнопку выше</span>
                </div>
                <div class="step">
                    <span class="step-number">2</span>
                    <span class="step-text">Поставь аватарку себе</span>
                </div>
                <div class="step">
                    <span class="step-number">3</span>
                    <span class="step-text">Напиши мне в Telegram 📱</span>
                </div>
            </div>
        </div>
        
        <div class="floating-emojis">
            <div class="float-emoji" style="--delay: 0s; --x: 10%">⭐</div>
            <div class="float-emoji" style="--delay: 1.5s; --x: 30%">✨</div>
            <div class="float-emoji" style="--delay: 3s; --x: 50%">💫</div>
            <div class="float-emoji" style="--delay: 4.5s; --x: 70%">🌟</div>
            <div class="float-emoji" style="--delay: 6s; --x: 90%">⭐</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
